<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ColdReach</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:system-ui,sans-serif;height:100vh;overflow:hidden}
.shell{display:flex;height:100vh}
.sidebar{width:220px;background:#0f0f0f;border-right:1px solid #222;padding:20px;overflow-y:auto}
.logo{font-size:16px;font-weight:700;margin-bottom:30px;color:#fff}
.nav-item{padding:12px;margin:4px 0;cursor:pointer;border-radius:8px;color:#888;transition:all 0.2s}
.nav-item:hover{background:#1a1a1a;color:#fff}
.nav-item.active{background:#2563eb;color:#fff}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:16px 24px;border-bottom:1px solid #222;display:flex;align-items:center;gap:12px}
.topbar h2{font-size:18px;font-weight:600}
.content{flex:1;overflow-y:auto;padding:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#1a1a1a;border:1px solid #222;border-radius:10px;padding:18px;text-align:center}
.stat-value{font-size:32px;font-weight:700;color:#60a5fa;margin-bottom:6px}
.stat-label{font-size:12px;color:#888;text-transform:uppercase}
.btn{padding:10px 16px;border:none;border-radius:8px;cursor:pointer;font-weight:600;background:#2563eb;color:#fff;transition:all 0.2s}
.btn:hover{background:#1d4ed8}
.btn-secondary{background:#1a1a1a;color:#888;border:1px solid #222}
.btn-secondary:hover{background:#222;color:#fff}
.table-wrap{background:#1a1a1a;border:1px solid #222;border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{padding:12px;text-align:left;font-size:12px;color:#666;text-transform:uppercase;border-bottom:1px solid #222;background:#0f0f0f}
td{padding:12px;border-bottom:1px solid #0f0f0f;font-size:13px}
tr:hover td{background:#111}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-box{background:#1a1a1a;border:1px solid #222;border-radius:12px;padding:24px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;color:#888;margin-bottom:6px;text-transform:uppercase}
.form-group input,.form-group textarea{width:100%;padding:10px;background:#0f0f0f;border:1px solid #222;border-radius:6px;color:#fff;font-family:inherit;outline:none}
.form-group input:focus,.form-group textarea:focus{border-color:#2563eb}
.form-group textarea{resize:vertical;min-height:120px}
.modal-footer{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#052e16;color:#4ade80}
.badge-blue{background:#0f2340;color:#60a5fa}
.badge-gray{background:#1a1a1a;color:#888}
.empty{text-align:center;padding:60px 20px;color:#666}
.error{background:#3d0d0d;border:1px solid #6b2323;color:#f87171;padding:12px;border-radius:8px;margin-bottom:16px}
.success{background:#052e16;border:1px solid #166534;color:#4ade80;padding:12px;border-radius:8px;margin-bottom:16px}
@media(max-width:768px){.sidebar{width:60px}.sidebar .label{display:none}.nav-item span{display:none}.main{margin-bottom:54px}}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#0f0f0f;border-top:1px solid #222;padding:8px;height:54px}
.bottom-nav-item{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;width:25%;cursor:pointer;font-size:10px;color:#666;transition:color 0.2s}
.bottom-nav-item.active{color:#60a5fa}
@media(max-width:768px){.sidebar{display:none}.bottom-nav{display:flex}}
</style>
</head>
<body>
<div class="shell">
  <div class="sidebar">
    <div class="logo">❄️ ColdReach</div>
    <div class="nav-item active" onclick="goPage('dashboard')">📊 Dashboard</div>
    <div class="nav-item" onclick="goPage('campaigns')">📋 Campaigns</div>
    <div class="nav-item" onclick="goPage('accounts')">📧 Accounts</div>
    <div class="nav-item" onclick="goPage('leads')">👥 Leads</div>
  </div>

  <div class="main">
    <div class="topbar">
      <h2 id="pageTitle">Dashboard</h2>
      <button class="btn" id="newBtn" style="margin-left:auto;display:none" onclick="openNewModal()">+ New</button>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="bottom-nav">
  <div class="bottom-nav-item active" onclick="goPage('dashboard')">📊</div>
  <div class="bottom-nav-item" onclick="goPage('campaigns')">📋</div>
  <div class="bottom-nav-item" onclick="goPage('accounts')">📧</div>
  <div class="bottom-nav-item" onclick="goPage('leads')">👥</div>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">Modal</div>
    <div id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn" id="modalSaveBtn" onclick="modalSave()">Save</button>
    </div>
  </div>
</div>

<script>
const API = "https://precious-warmth-coldreach.railway.app";
let currentPage = "dashboard";
let campaigns = [];
let leads = [];
let accounts = [];
let modalType = "";

async function api(path, opts={}) {
  try{const r=await fetch(API+path,{headers:{"Content-Type":"application/json"},...opts});if(!r.ok)throw new Error(`HTTP ${r.status}`);return await r.json()}catch(e){console.error(e);alert("API Error: "+e.message);return null}
}

function goPage(page){
  currentPage=page;
  document.querySelectorAll(".nav-item").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".bottom-nav-item").forEach(x=>x.classList.remove("active"));
  event.target.closest(".nav-item")?.classList.add("active");
  event.target.closest(".bottom-nav-item")?.classList.add("active");
  if(page==="dashboard")loadDashboard();
  if(page==="campaigns")loadCampaigns();
  if(page==="accounts")loadAccounts();
  if(page==="leads")loadLeads();
}

async function loadDashboard(){
  document.getElementById("pageTitle").textContent="Dashboard";
  document.getElementById("newBtn").style.display="none";
  const [c,l,a]=await Promise.all([api("/api/campaigns").catch(()=>[]),api("/api/leads").catch(()=>[]),api("/api/accounts").catch(()=>[])]);
  campaigns=c||[];leads=l||[];accounts=a||[];
  const sent=leads.filter(x=>["sent","replied"].includes(x.status)).length;
  const replied=leads.filter(x=>x.status==="replied").length;
  document.getElementById("content").innerHTML=`
    <div class="grid">
      <div class="stat-card"><div class="stat-value">${campaigns.length}</div><div class="stat-label">Campaigns</div></div>
      <div class="stat-card"><div class="stat-value">${leads.length}</div><div class="stat-label">Total Leads</div></div>
      <div class="stat-card"><div class="stat-value">${sent}</div><div class="stat-label">Emails Sent</div></div>
      <div class="stat-card"><div class="stat-value">${replied}</div><div class="stat-label">Replies</div></div>
      <div class="stat-card"><div class="stat-value">${accounts.length}</div><div class="stat-label">Accounts</div></div>
    </div>
    <div style="background:#1a1a1a;border:1px solid #222;border-radius:10px;padding:20px">
      <h3 style="margin-bottom:16px">📧 Gmail Accounts</h3>
      ${accounts.length===0?"<p style='color:#666'>No accounts connected</p>":accounts.map(a=>`
        <div style="padding:12px;border-bottom:1px solid #222"><strong>${a.email}</strong> • ${a.sent_today||0}/${a.daily_limit||15} sent today</div>
      `).join("")}
    </div>
  `;
}

async function loadCampaigns(){
  document.getElementById("pageTitle").textContent="Campaigns";
  document.getElementById("newBtn").style.display="block";
  document.getElementById("newBtn").onclick=()=>openNewModal();
  if(!campaigns.length)campaigns=await api("/api/campaigns")||[];
  document.getElementById("content").innerHTML=campaigns.length===0?`<div class="empty">📋 No campaigns yet<br><button class="btn" onclick="openNewModal()">+ Create Campaign</button></div>`:`
    <div class="table-wrap">
      <table>
        <thead><tr><th>Name</th><th>Steps</th><th>Leads</th><th>Status</th><th>Action</th></tr></thead>
        <tbody>${campaigns.map(c=>`<tr><td>${c.name}</td><td>${(c.steps||[]).length}</td><td>${c.lead_count||0}</td><td><span class="badge ${c.active?"badge-green":"badge-gray"}">${c.active?"Active":"Paused"}</span></td><td><button class="btn btn-secondary" onclick="editCampaign(${c.id})">Edit</button></td></tr>`).join("")}</tbody>
      </table>
    </div>
  `;
}

async function loadAccounts(){
  document.getElementById("pageTitle").textContent="Email Accounts";
  document.getElementById("newBtn").style.display="block";
  document.getElementById("newBtn").onclick=()=>{modalType="account";openModal("Add Gmail Account","<div class='form-group'><label>Email</label><input id='accEmail' placeholder='you@gmail.com' type='email'/></div><div class='form-group'><label>App Password</label><input id='accPass' placeholder='16-char password' type='password'/></div><div class='form-group'><label>Daily Limit</label><input id='accLimit' value='15' type='number' min='1' max='50'/></div>")};
  if(!accounts.length)accounts=await api("/api/accounts")||[];
  document.getElementById("content").innerHTML=accounts.length===0?`<div class="empty">📭 No accounts<br><button class="btn" onclick="document.querySelector('[onclick*=accEmail]')?.click()">+ Add Account</button></div>`:`<div>${accounts.map(a=>{const pct=Math.min(100,((a.sent_today||0)/(a.daily_limit||15))*100);return `<div style="background:#1a1a1a;border:1px solid #222;border-radius:10px;padding:16px;margin-bottom:12px"><strong>${a.email}</strong><div style="font-size:12px;color:#888;margin:8px 0">${a.sent_today||0}/${a.daily_limit||15} sent today (${pct.toFixed(0)}%)</div></div>`;}).join("")}</div>`;
}

async function loadLeads(){
  document.getElementById("pageTitle").textContent="Leads";
  document.getElementById("newBtn").style.display="none";
  if(!leads.length)leads=await api("/api/leads")||[];
  document.getElementById("content").innerHTML=leads.length===0?`<div class="empty">👥 No leads</div>`:`
    <div class="table-wrap">
      <table>
        <thead><tr><th>Email</th><th>Name</th><th>Company</th><th>Status</th></tr></thead>
        <tbody>${leads.map(l=>`<tr><td>${l.email}</td><td>${l.first_name} ${l.last_name}</td><td>${l.company||"-"}</td><td><span class="badge badge-blue">${l.status||"Queued"}</span></td></tr>`).join("")}</tbody>
      </table>
    </div>
  `;
}

function openModal(title,body){
  document.getElementById("modalTitle").textContent=title;
  document.getElementById("modalBody").innerHTML=body;
  document.getElementById("modal").classList.add("show");
}

function closeModal(){
  document.getElementById("modal").classList.remove("show");
  modalType="";
}

async function modalSave(){
  if(modalType==="campaign"){
    const name=document.getElementById("campName")?.value;
    if(!name){alert("Name required");return}
    const res=await api("/api/campaigns",{method:"POST",body:JSON.stringify({name,steps:[{subject:"",body:"",delay_days:0}]})});
    if(res){alert("Campaign created!");closeModal();loadCampaigns()}
  }
  if(modalType==="account"){
    const email=document.getElementById("accEmail")?.value;
    const pass=document.getElementById("accPass")?.value;
    const limit=document.getElementById("accLimit")?.value||15;
    if(!email||!pass){alert("All fields required");return}
    const res=await api("/api/accounts",{method:"POST",body:JSON.stringify({email,app_password:pass,daily_limit:+limit})});
    if(res){alert("Account added!");closeModal();loadAccounts()}
  }
}

function openNewModal(){
  if(currentPage==="campaigns"){
    modalType="campaign";
    openModal("New Campaign","<div class='form-group'><label>Campaign Name</label><input id='campName' placeholder='e.g. Web Design Outreach' autofocus/></div>");
  }
}

function editCampaign(id){
  const camp=campaigns.find(c=>c.id===id);
  if(camp)alert("Full campaign editor coming soon. For now, edit via API or backend.");
}

loadDashboard();
</script>
</body>
</html>
