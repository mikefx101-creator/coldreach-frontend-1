<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ColdReach</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--border:#252525;--text:#e2e2e2;--muted:#666;--blue:#3b82f6;--blue-dark:#1d4ed8;--green:#22c55e;--red:#ef4444;--yellow:#eab308}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;height:100vh;overflow:hidden;font-size:14px}
.app{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:20px 18px;font-size:15px;font-weight:700;color:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.logo span{font-size:20px}
.nav{padding:12px 8px;flex:1}
.nav-item{padding:10px 12px;border-radius:7px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;transition:all 0.15s;margin-bottom:2px}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:#1e3a5f;color:#93c5fd}
.nav-item .icon{width:16px;text-align:center;font-size:14px}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);flex-shrink:0}
.topbar-left h2{font-size:16px;font-weight:600}
.topbar-left p{font-size:12px;color:var(--muted);margin-top:2px}
.content{flex:1;overflow-y:auto;padding:24px;overflow-x:hidden}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px}
.stat-card .val{font-size:26px;font-weight:700;color:var(--blue)}
.stat-card .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:600;margin-top:6px}

/* BUTTONS */
.btn{padding:9px 16px;border:none;border-radius:7px;cursor:pointer;font-weight:600;font-size:13px;transition:all 0.15s}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:var(--blue-dark)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-danger{background:transparent;color:var(--red);border:1px solid #3d1515}.btn-danger:hover{background:#3d1515;color:var(--red)}
.btn-green{background:#14532d;color:var(--green);border:1px solid #166534}.btn-green:hover{background:#166534}
.btn-yellow{background:#2d2000;color:var(--yellow);border:1px solid #3d2f00}.btn-yellow:hover{background:#3d2f00}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-icon{padding:5px 8px;font-size:12px;line-height:1}

/* TABLE */
.card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:13px}
table{width:100%;border-collapse:collapse}
th{padding:12px 16px;text-align:left;font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:600;border-bottom:1px solid var(--border);background:var(--surface);white-space:nowrap}
td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#0f0f0f}

/* BADGES */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-green{background:#052e16;color:#4ade80}
.badge-blue{background:#0f2040;color:#60a5fa}
.badge-gray{background:#1c1c1c;color:#888}
.badge-yellow{background:#2d2000;color:#fbbf24}
.badge-red{background:#2d0808;color:#f87171}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:560px;max-height:90vh;display:flex;flex-direction:column}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-head h3{font-size:15px;font-weight:700}
.modal-body{padding:22px;overflow-y:auto;flex:1}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}

/* FORMS */
.fg{margin-bottom:16px}
.fg label{display:block;font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;margin-bottom:6px}
.fg input,.fg textarea,.fg select{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border 0.15s}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--blue)}
.fg textarea{resize:vertical;min-height:100px;line-height:1.5}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg small{display:block;font-size:11px;color:var(--muted);margin-top:5px}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab-btn{padding:10px 16px;border:none;background:transparent;color:var(--muted);font-weight:600;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:#60a5fa;border-bottom-color:var(--blue)}

/* CAMPAIGN DETAIL */
.camp-layout{display:grid;grid-template-columns:220px 1fr;gap:20px}
.seq-panel{display:flex;flex-direction:column;gap:8px}
.seq-step{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:all 0.15s}
.seq-step:hover{border-color:var(--blue)}
.seq-step.active{border-color:var(--blue);background:#0e1e38}
.seq-step .snum{width:24px;height:24px;background:var(--blue);border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;margin-bottom:6px}
.seq-step .stitle{font-size:12px;font-weight:600;color:var(--text)}
.seq-step .smeta{font-size:11px;color:var(--muted);margin-top:3px}
.editor-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:18px}
.var-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.var-chip{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:5px 10px;font-size:11px;font-family:monospace;color:var(--muted);cursor:pointer;transition:all 0.15s}
.var-chip:hover{background:var(--blue);border-color:var(--blue);color:#fff}

/* SCHEDULE BOX */
.schedule-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:16px}
.schedule-box .sched-title{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;margin-bottom:14px}
.schedule-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* DROP ZONE */
.dropzone{border:2px dashed var(--border);border-radius:10px;padding:36px 20px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--bg)}
.dropzone:hover,.dropzone.dragover{border-color:var(--blue);background:#0a0f1a}
.dropzone input[type=file]{display:none}
.dropzone .dz-icon{font-size:30px;margin-bottom:10px}
.dropzone .dz-text{font-size:13px;color:var(--muted)}
.dropzone .dz-sub{font-size:11px;color:#555;margin-top:6px}

/* EMPTY */
.empty{padding:60px 20px;text-align:center;color:var(--muted)}
.empty .ei{font-size:40px;margin-bottom:12px;opacity:0.4}
.empty h3{font-size:15px;font-weight:600;color:#888;margin-bottom:6px}
.empty p{font-size:13px;color:#555}

/* INFO BOX */
.info-box{background:#0d1425;border:1px solid #1e3a5f;border-radius:8px;padding:12px;font-size:12px;color:#93c5fd;margin-bottom:16px}
.success-box{background:#052e16;border:1px solid #166534;border-radius:8px;padding:12px;font-size:12px;color:#4ade80;margin-bottom:16px}
.warning-box{background:#1c1400;border:1px solid #3d2f00;border-radius:8px;padding:12px;font-size:12px;color:#fbbf24;margin-bottom:16px}

/* PROGRESS BAR */
.progress{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:2px;transition:width 0.3s}

/* MOBILE */
@media(max-width:900px){.camp-layout{grid-template-columns:1fr}.fg-row{grid-template-columns:1fr}.schedule-row{grid-template-columns:1fr}}
@media(max-width:720px){.sidebar{width:56px}.logo span:last-child,.nav-item .label{display:none}.topbar{flex-direction:column;align-items:flex-start;gap:8px}}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo"><span>❄️</span><span class="label">ColdReach</span></div>
    <div class="nav">
      <div class="nav-item active" data-page="dashboard"><span class="icon">📊</span><span class="label">Dashboard</span></div>
      <div class="nav-item" data-page="campaigns"><span class="icon">📋</span><span class="label">Campaigns</span></div>
      <div class="nav-item" data-page="accounts"><span class="icon">📧</span><span class="label">Email Accounts</span></div>
      <div class="nav-item" data-page="leads"><span class="icon">👥</span><span class="label">All Leads</span></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <h2 id="page-title">Dashboard</h2>
        <p id="page-sub">Your outreach overview</p>
      </div>
      <div id="page-actions"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-head">
      <h3 id="modal-title">Modal</h3>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()" style="border:none;width:32px;height:32px;padding:0;font-size:16px">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modal-save">Save</button>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const API = "https://coldreach-production-ce11.up.railway.app";
let campaigns = [], accounts = [], modalSaveFn = null;
let currentCampaignId = null, currentStepIndex = 0;

const VARIABLES = ["{{firstName}}", "{{lastName}}", "{{company}}", "{{email}}", "{{iceBreaker}}"];

// ─── API HELPER ───────────────────────────────────────────────────────────────
async function apiCall(method, path, body = null) {
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || "API error");
  return data;
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
document.querySelectorAll(".nav-item").forEach(el => {
  el.addEventListener("click", () => {
    document.querySelectorAll(".nav-item").forEach(x => x.classList.remove("active"));
    el.classList.add("active");
    const page = el.dataset.page;
    if (page === "dashboard") renderDashboard();
    if (page === "campaigns") renderCampaigns();
    if (page === "accounts") renderAccounts();
    if (page === "leads") renderAllLeads();
  });
});

function setPage(title, sub, actionsHtml = "") {
  document.getElementById("page-title").textContent = title;
  document.getElementById("page-sub").textContent = sub;
  document.getElementById("page-actions").innerHTML = actionsHtml;
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(title, bodyHtml, saveFn, saveLabel = "Save") {
  document.getElementById("modal-title").textContent = title;
  document.getElementById("modal-body").innerHTML = bodyHtml;
  document.getElementById("modal-save").textContent = saveLabel;
  document.getElementById("modal-overlay").classList.add("open");
  modalSaveFn = saveFn;
}
function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  modalSaveFn = null;
}
document.getElementById("modal-save").onclick = () => { if (modalSaveFn) modalSaveFn(); };
document.getElementById("modal-overlay").onclick = (e) => { if (e.target === e.currentTarget) closeModal(); };

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
async function renderDashboard() {
  setPage("Dashboard", "Your outreach overview");
  document.getElementById("content").innerHTML = `<div style="color:var(--muted);padding:40px 0;text-align:center">Loading...</div>`;
  try {
    campaigns = await apiCall("GET", "/api/campaigns");
    accounts = await apiCall("GET", "/api/accounts");
    const allLeads = campaigns.flatMap(c => c.leads || []);
    const sent = allLeads.filter(l => l.status === "sent").length;
    const replied = allLeads.filter(l => l.replied).length;
    const active = campaigns.filter(c => c.status === "active").length;
    document.getElementById("content").innerHTML = `
      <div class="stats-grid">
        <div class="stat-card"><div class="val">${campaigns.length}</div><div class="lbl">Campaigns</div></div>
        <div class="stat-card"><div class="val">${active}</div><div class="lbl">Active</div></div>
        <div class="stat-card"><div class="val">${allLeads.length}</div><div class="lbl">Total Leads</div></div>
        <div class="stat-card"><div class="val">${sent}</div><div class="lbl">Emails Sent</div></div>
        <div class="stat-card"><div class="val">${replied}</div><div class="lbl">Replies</div></div>
        <div class="stat-card"><div class="val">${accounts.length}</div><div class="lbl">Accounts</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
        <div class="card">
          <div class="card-header">📋 Recent Campaigns</div>
          ${campaigns.length === 0 ? `<div class="empty"><p>No campaigns yet</p></div>` : `<table>
            <thead><tr><th>Name</th><th>Leads</th><th>Sent</th><th>Status</th></tr></thead>
            <tbody>${campaigns.slice(0,5).map(c => `<tr>
              <td style="font-weight:600">${c.name}</td>
              <td>${c.leads?.length || 0}</td>
              <td>${c.leads?.filter(l => l.status==="sent").length || 0}</td>
              <td><span class="badge badge-${c.status==="active"?"green":"gray"}">${c.status}</span></td>
            </tr>`).join("")}</tbody>
          </table>`}
        </div>
        <div class="card">
          <div class="card-header">📧 Email Accounts</div>
          ${accounts.length === 0 ? `<div class="empty"><p>No accounts connected</p></div>` : accounts.map(a => {
            const pct = Math.min(100, ((a.sentToday||0) / (a.limit||15)) * 100);
            return `<div style="padding:12px 16px;border-bottom:1px solid var(--border)">
              <div style="font-weight:600">${a.email}</div>
              <div style="font-size:11px;color:var(--muted);margin-top:4px">${a.sentToday||0}/${a.limit} sent today</div>
              <div class="progress"><div class="progress-fill" style="width:${pct}%;background:${pct>80?"var(--red)":"var(--green)"}"></div></div>
            </div>`;
          }).join("")}
        </div>
      </div>`;
  } catch(e) {
    document.getElementById("content").innerHTML = `<div style="color:var(--red);padding:20px">Error: ${e.message}</div>`;
  }
}

// ─── CAMPAIGNS LIST ───────────────────────────────────────────────────────────
async function renderCampaigns() {
  setPage("Campaigns", "Create and manage email campaigns",
    `<button class="btn btn-primary" onclick="openNewCampaignModal()">+ New Campaign</button>`);
  document.getElementById("content").innerHTML = `<div style="color:var(--muted);padding:40px 0;text-align:center">Loading...</div>`;
  try {
    campaigns = await apiCall("GET", "/api/campaigns");
    if (campaigns.length === 0) {
      document.getElementById("content").innerHTML = `<div class="empty"><div class="ei">📋</div><h3>No campaigns yet</h3><p>Create your first cold email campaign</p><br><button class="btn btn-primary" onclick="openNewCampaignModal()">+ New Campaign</button></div>`;
      return;
    }
    document.getElementById("content").innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px">
        ${campaigns.map(c => {
          const sched = c.schedule;
          const scheduleText = sched?.startDate
            ? `Starts ${sched.startDate} · ${sched.sendTime||"09:00"} IST`
            : `Daily at ${sched?.sendTime||"09:00"} IST`;
          return `
          <div class="card" style="cursor:pointer" onclick="renderCampaignDetail('${c.id}')">
            <div style="padding:18px">
              <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:12px">
                <div style="font-weight:700;font-size:14px">${c.name}</div>
                <span class="badge badge-${c.status==="active"?"green":"gray"}">${c.status}</span>
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center;background:var(--bg);border-radius:7px;padding:10px">
                <div><div style="font-size:16px;font-weight:700">${c.leads?.length||0}</div><div style="font-size:10px;color:var(--muted)">Leads</div></div>
                <div><div style="font-size:16px;font-weight:700">${c.leads?.filter(l=>l.status==="sent").length||0}</div><div style="font-size:10px;color:var(--muted)">Sent</div></div>
                <div><div style="font-size:16px;font-weight:700">${c.leads?.filter(l=>l.replied).length||0}</div><div style="font-size:10px;color:var(--muted)">Replied</div></div>
              </div>
              <div style="margin-top:12px;font-size:11px;color:var(--muted);display:flex;justify-content:space-between">
                <span>${(c.sequence||[]).length} email steps</span>
                <span>🕐 ${scheduleText}</span>
              </div>
            </div>
          </div>`
        }).join("")}
      </div>`;
  } catch(e) {
    document.getElementById("content").innerHTML = `<div style="color:var(--red);padding:20px">Error: ${e.message}</div>`;
  }
}

function openNewCampaignModal() {
  openModal("Create Campaign", `
    <div class="fg"><label>Campaign Name</label><input id="m-camp-name" placeholder="e.g. Web Design Outreach - US Q3" autofocus/></div>`,
    async () => {
      const name = document.getElementById("m-camp-name").value.trim();
      if (!name) { alert("Enter a name"); return; }
      try {
        await apiCall("POST", "/api/campaigns", { name, sequence: [] });
        closeModal();
        renderCampaigns();
      } catch(e) { alert("Error: " + e.message); }
    }, "Create Campaign");
}

// ─── CAMPAIGN DETAIL ──────────────────────────────────────────────────────────
async function renderCampaignDetail(id) {
  currentCampaignId = id;
  const c = campaigns.find(x => x.id === id);
  if (!c) return;

  const queuedLeads = (c.leads || []).filter(l => l.status === "queued" || !l.status).length;

  setPage(c.name, `${c.leads?.length||0} leads · ${(c.sequence||[]).length} steps`,
    `<div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-ghost btn-sm" onclick="renderCampaigns()">← Back</button>
      <button class="btn btn-sm ${c.status==="active"?"btn-ghost":"btn-green"}" onclick="toggleCampaignStatus('${id}')">${c.status==="active"?"⏸ Pause":"▶ Activate"}</button>
      <button class="btn btn-yellow btn-sm" onclick="sendNow('${id}')" ${queuedLeads===0?"disabled style='opacity:0.4;cursor:not-allowed'":""}>⚡ Send Now (${queuedLeads} queued)</button>
      <button class="btn btn-primary btn-sm" onclick="openAddLeadsModal('${id}')">+ Add Leads</button>
    </div>`);

  let activeTab = "sequence";

  function renderTabContent() {
    if (activeTab === "sequence") renderSequenceTab(c);
    if (activeTab === "leads") renderLeadsTab(c);
    if (activeTab === "analytics") renderAnalyticsTab(c);
    if (activeTab === "schedule") renderScheduleTab(c);
  }

  document.getElementById("content").innerHTML = `
    <div class="tabs" id="camp-tabs">
      <button class="tab-btn active" data-tab="sequence">✉️ Sequence</button>
      <button class="tab-btn" data-tab="leads">👥 Leads (${c.leads?.length||0})</button>
      <button class="tab-btn" data-tab="schedule">🕐 Schedule</button>
      <button class="tab-btn" data-tab="analytics">📊 Analytics</button>
    </div>
    <div id="tab-content"></div>`;

  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll(".tab-btn").forEach(x => x.classList.remove("active"));
      btn.classList.add("active");
      activeTab = btn.dataset.tab;
      renderTabContent();
    };
  });
  renderTabContent();
}

// ─── SEND NOW ─────────────────────────────────────────────────────────────────
async function sendNow(id) {
  const c = campaigns.find(x => x.id === id);
  if (!c) return;

  const queued = (c.leads || []).filter(l => l.status === "queued" || !l.status).length;
  if (queued === 0) { alert("No queued leads to send."); return; }
  if (!c.sequence || c.sequence.length === 0) { alert("Add email steps to the sequence first."); return; }

  if (!confirm(`Send emails to all ${queued} queued leads right now?`)) return;

  const btn = document.querySelector(".btn-yellow");
  if (btn) { btn.textContent = "⏳ Sending..."; btn.disabled = true; }

  try {
    const result = await apiCall("POST", `/api/campaigns/${id}/send-now`);
    const fresh = await apiCall("GET", "/api/campaigns");
    campaigns = fresh;
    alert(`✓ Done! ${result.sent} emails sent successfully.`);
    renderCampaignDetail(id);
  } catch(e) {
    alert("Error: " + e.message);
    if (btn) { btn.textContent = `⚡ Send Now (${queued} queued)`; btn.disabled = false; }
  }
}

// ─── SCHEDULE TAB ─────────────────────────────────────────────────────────────
function renderScheduleTab(c) {
  const sched = c.schedule || {};
  const today = new Date().toISOString().slice(0, 10);

  document.getElementById("tab-content").innerHTML = `
    <div style="max-width:500px">
      <div class="info-box">
        Set when this campaign sends emails daily. All times are in IST (Indian Standard Time).<br>
        <strong>Start Date</strong> = campaign won't send before this date.<br>
        <strong>Send Time</strong> = what time every day to send (IST).<br>
        Leave Start Date empty to start immediately when activated.
      </div>

      <div class="schedule-box">
        <div class="sched-title">📅 Schedule Settings</div>
        <div class="schedule-row">
          <div class="fg" style="margin-bottom:0">
            <label>Start Date (IST)</label>
            <input type="date" id="sched-start" value="${sched.startDate||""}" min="${today}"/>
            <small>Leave empty to send from today</small>
          </div>
          <div class="fg" style="margin-bottom:0">
            <label>Send Time (IST)</label>
            <input type="time" id="sched-time" value="${sched.sendTime||"09:00"}"/>
            <small>Time in IST — e.g. 09:00 for 9 AM</small>
          </div>
        </div>
      </div>

      ${sched.startDate || sched.sendTime ? `
        <div class="warning-box">
          Current schedule: ${sched.startDate ? `Starts <strong>${sched.startDate}</strong> · ` : ""}Daily at <strong>${sched.sendTime||"09:00"} IST</strong>
        </div>` : ""}

      <button class="btn btn-primary" onclick="saveSchedule('${c.id}')">💾 Save Schedule</button>
      ${sched.startDate || sched.sendTime ? `
        <button class="btn btn-ghost" style="margin-left:8px" onclick="clearSchedule('${c.id}')">✕ Clear Schedule</button>` : ""}
    </div>`;
}

async function saveSchedule(id) {
  const startDate = document.getElementById("sched-start")?.value || "";
  const sendTime = document.getElementById("sched-time")?.value || "09:00";

  const c = campaigns.find(x => x.id === id);
  if (!c) return;

  const schedule = { sendTime };
  if (startDate) schedule.startDate = startDate;

  try {
    await apiCall("PUT", `/api/campaigns/${id}`, {
      name: c.name, status: c.status, sequence: c.sequence, schedule
    });
    const fresh = await apiCall("GET", "/api/campaigns");
    campaigns = fresh;
    const updated = campaigns.find(x => x.id === id);
    renderScheduleTab(updated);

    const btn = document.querySelector("#tab-content .btn-primary");
    if (btn) { btn.textContent = "✓ Saved"; setTimeout(() => { btn.textContent = "💾 Save Schedule"; }, 1500); }
  } catch(e) { alert("Error: " + e.message); }
}

async function clearSchedule(id) {
  if (!confirm("Clear schedule? Campaign will fall back to default 9 AM IST.")) return;
  const c = campaigns.find(x => x.id === id);
  if (!c) return;
  try {
    await apiCall("PUT", `/api/campaigns/${id}`, {
      name: c.name, status: c.status, sequence: c.sequence, schedule: null
    });
    const fresh = await apiCall("GET", "/api/campaigns");
    campaigns = fresh;
    const updated = campaigns.find(x => x.id === id);
    renderScheduleTab(updated);
  } catch(e) { alert("Error: " + e.message); }
}

// ─── ANALYTICS TAB ────────────────────────────────────────────────────────────
function renderAnalyticsTab(c) {
  const leads = c.leads || [];
  const total = leads.length;
  const sent = leads.filter(l => l.status==="sent").length;
  const replied = leads.filter(l => l.replied).length;
  const replyRate = sent > 0 ? ((replied/sent)*100).toFixed(1) : 0;
  const sentRate = total > 0 ? ((sent/total)*100).toFixed(1) : 0;
  function bar(val, max, color) {
    const pct = max > 0 ? Math.min(100, (val/max)*100) : 0;
    return `<div style="background:var(--border);border-radius:4px;height:8px;overflow:hidden;margin-top:6px"><div style="width:${pct}%;height:100%;background:${color};border-radius:4px"></div></div>`;
  }
  document.getElementById("tab-content").innerHTML = `
    <div class="stats-grid" style="margin-bottom:20px">
      <div class="stat-card"><div class="val">${total}</div><div class="lbl">Total Leads</div></div>
      <div class="stat-card"><div class="val">${sent}</div><div class="lbl">Emails Sent</div></div>
      <div class="stat-card"><div class="val">${replied}</div><div class="lbl">Replies</div></div>
      <div class="stat-card"><div class="val">${replyRate}%</div><div class="lbl">Reply Rate</div></div>
    </div>
    <div class="card">
      <div class="card-header">Funnel</div>
      <div style="padding:20px">
        <div style="margin-bottom:16px">
          <div style="display:flex;justify-content:space-between"><span>Leads Added</span><strong>${total}</strong></div>
          ${bar(total, total, "#3b82f6")}
        </div>
        <div style="margin-bottom:16px">
          <div style="display:flex;justify-content:space-between"><span>Emails Sent</span><strong>${sent} (${sentRate}%)</strong></div>
          ${bar(sent, total, "#22c55e")}
        </div>
        <div>
          <div style="display:flex;justify-content:space-between"><span>Replies</span><strong>${replied} (${replyRate}%)</strong></div>
          ${bar(replied, sent, "#eab308")}
        </div>
      </div>
    </div>`;
}

function selectStep(i, id) {
  currentStepIndex = i;
  const c = campaigns.find(x => x.id === id);
  if (c) renderSequenceTab(c);
}

function insertVariable(v, targetId) {
  const el = document.getElementById(targetId);
  if (!el) return;
  const s = el.selectionStart, e = el.selectionEnd;
  el.value = el.value.slice(0, s) + v + el.value.slice(e);
  el.selectionStart = el.selectionEnd = s + v.length;
  el.focus();
}

async function saveStep(id, idx) {
  const subj = document.getElementById("step-subj")?.value || "";
  const body = document.getElementById("step-body")?.value || "";
  const dayEl = document.getElementById("step-day");
  if (!subj || !body) { alert("Subject and body are required"); return; }
  const c = campaigns.find(x => x.id === id);
  if (!c) return;
  c.sequence[idx] = { day: idx === 0 ? 0 : parseInt(dayEl?.value || 1), subject: subj, body };
  try {
    await apiCall("PUT", `/api/campaigns/${id}`, { name: c.name, status: c.status, sequence: c.sequence });
    const fresh = await apiCall("GET", "/api/campaigns");
    campaigns = fresh;
    const updated = campaigns.find(x => x.id === id);
    renderSequenceTab(updated);
    const btn = document.querySelector(".editor-box .btn-primary");
    if (btn) { btn.textContent = "✓ Saved"; setTimeout(() => { btn.textContent = "💾 Save Step"; }, 1500); }
  } catch(e) { alert("Error: " + e.message); }
}

async function addStep(id) {
  const c = campaigns.find(x => x.id === id);
  if (!c) return;
  c.sequence.push({ day: c.sequence.length, subject: "", body: "" });
  currentStepIndex = c.sequence.length - 1;
  try {
    await apiCall("PUT", `/api/campaigns/${id}`, { name: c.name, status: c.status, sequence: c.sequence });
    const fresh = await apiCall("GET", "/api/campaigns");
    campaigns = fresh;
    renderCampaignDetail(id);
  } catch(e) { alert("Error: " + e.message); }
}

async function toggleCampaignStatus(id) {
  const c = campaigns.find(x => x.id === id);
  if (!c) return;
  const newStatus = c.status === "active" ? "draft" : "active";
  try {
    await apiCall("PUT", `/api/campaigns/${id}`, { name: c.name, status: newStatus, sequence: c.sequence });
    const fresh = await apiCall("GET", "/api/campaigns");
    campaigns = fresh;
    renderCampaignDetail(id);
  } catch(e) { alert("Error: " + e.message); }
}

// ─── DELETE LEAD ───────────────────────────────────────────────────────────────
async function deleteLead(leadId, campaignId) {
  if (!confirm("Delete this lead? This cannot be undone.")) return;
  try {
    await apiCall("DELETE", `/api/leads/${leadId}`);
    const fresh = await apiCall("GET", "/api/campaigns");
    campaigns = fresh;
    const c = campaigns.find(x => x.id === campaignId);
    if (c) renderLeadsTab(c);
  } catch(e) { alert("Error: " + e.message); }
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById("dropzone").classList.remove("dragover");
  const f = e.dataTransfer.files[0];
  if (f) handleCSV({ target: { files: [f] } });
}

function handleCSV(e) {
  const f = e.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = (evt) => {
    const lines = evt.target.result.split("\n").map(l => l.trim()).filter(Boolean);
    if (lines.length < 2) { alert("CSV has no data rows"); return; }
    const headers = lines[0].split(",").map(h => h.trim().toLowerCase());
    const leads = [];
    for (let i = 1; i < lines.length; i++) {
      const vals = lines[i].split(",").map(v => v.trim().replace(/^"|"$/g, ""));
      const obj = {};
      headers.forEach((h, idx) => { obj[h] = vals[idx] || ""; });
      const lead = {
        firstName: obj.firstname || obj.first_name || obj.fname || "",
        lastName: obj.lastname || obj.last_name || obj.lname || "",
        email: obj.email || obj.emailaddress || "",
        company: obj.company || obj.organization || obj.org || "",
        iceBreaker: obj.icebreaker || obj.ice_breaker || ""
      };
      if (lead.email) leads.push(lead);
    }
    window._csvLeads = leads;
    document.getElementById("csv-preview").innerHTML = leads.length > 0
      ? `<div class="success-box" style="margin-top:12px">✓ ${leads.length} leads ready to import<br><small style="opacity:0.8">Preview: ${leads.slice(0,3).map(l => l.email).join(", ")}${leads.length>3?"...":""}</small></div>`
      : `<div style="color:var(--red);padding:12px">No valid leads found. Check your CSV format.</div>`;
  };
  reader.readAsText(f);
}

  try {
    const response = await apiCall("GET", "/auth/google");
    if (response.authUrl) {
      window.open(response.authUrl, "popup", "width=600,height=600");
      // After user authorizes, they'll be redirected and account will be created
      // Poll to refresh accounts list
      setTimeout(() => {
        renderAccounts();
        closeModal();
      }, 3000);
    }
  } catch(e) {
    alert("Error: " + e.message);
  }
}

// ─── ALL LEADS ────────────────────────────────────────────────────────────────
async function renderAllLeads() {
  setPage("All Leads", "View leads across all campaigns");
  document.getElementById("content").innerHTML = `<div style="color:var(--muted);padding:40px 0;text-align:center">Loading...</div>`;
  try {
    campaigns = await apiCall("GET", "/api/campaigns");
    const allLeads = campaigns.flatMap(c => (c.leads||[]).map(l => ({ ...l, campaignName: c.name, campaignId: c.id })));
    const replied = allLeads.filter(l => l.replied);
    const sent = allLeads.filter(l => l.status==="sent");
    const queued = allLeads.filter(l => !l.status || l.status==="queued");
    document.getElementById("content").innerHTML = `
      <div class="stats-grid" style="margin-bottom:20px">
        <div class="stat-card"><div class="val">${allLeads.length}</div><div class="lbl">Total</div></div>
        <div class="stat-card"><div class="val">${queued.length}</div><div class="lbl">Queued</div></div>
        <div class="stat-card"><div class="val">${sent.length}</div><div class="lbl">Sent</div></div>
        <div class="stat-card"><div class="val">${replied.length}</div><div class="lbl">Replied</div></div>
      </div>
      ${replied.length > 0 ? `
        <div class="card" style="margin-bottom:20px">
          <div class="card-header">✉️ Replies (${replied.length})</div>
          <table>
            <thead><tr><th>Email</th><th>Name</th><th>Company</th><th>Campaign</th><th>Replied At</th></tr></thead>
            <tbody>${replied.map(l => `<tr>
              <td style="color:#60a5fa;font-weight:500">${l.email}</td>
              <td>${(l.firstName||"")} ${(l.lastName||"")}</td>
              <td>${l.company||"—"}</td>
              <td>${l.campaignName}</td>
              <td style="font-size:11px;color:var(--muted)">${l.repliedAt ? new Date(l.repliedAt).toLocaleDateString() : "—"}</td>
            </tr>`).join("")}</tbody>
          </table>
        </div>` : ""}
      <div class="card">
        <div class="card-header">All Leads</div>
        ${allLeads.length === 0 ? `<div class="empty"><p>No leads yet</p></div>` : `<table>
          <thead><tr><th>Email</th><th>Name</th><th>Company</th><th>Campaign</th><th>Status</th><th>Replied</th><th></th></tr></thead>
          <tbody>${allLeads.map(l => `<tr>
            <td style="color:#60a5fa">${l.email}</td>
            <td>${(l.firstName||"")} ${(l.lastName||"")}</td>
            <td>${l.company||"—"}</td>
            <td style="font-size:12px">${l.campaignName}</td>
            <td><span class="badge badge-${l.status==="sent"?"blue":"gray"}">${l.status||"queued"}</span></td>
            <td><span class="badge badge-${l.replied?"green":"gray"}">${l.replied?"✓ Yes":"No"}</span></td>
            <td><button class="btn btn-danger btn-icon" onclick="deleteLeadFromAll('${l.id}')" title="Delete lead">🗑</button></td>
          </tr>`).join("")}</tbody>
        </table>`}
      </div>`;
  } catch(e) {
    document.getElementById("content").innerHTML = `<div style="color:var(--red);padding:20px">Error: ${e.message}</div>`;
  }
}

async function deleteLeadFromAll(leadId) {
  if (!confirm("Delete this lead? This cannot be undone.")) return;
  try {
    await apiCall("DELETE", `/api/leads/${leadId}`);
    renderAllLeads();
  } catch(e) { alert("Error: " + e.message); }
}

// ─── START ────────────────────────────────────────────────────────────────────
renderDashboard();
</script>
